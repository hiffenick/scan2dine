{% extends 'base.html' %}
{% block content %}
<div style="min-height:80vh; display:flex; flex-direction:column; align-items:center; 
            justify-content:center; text-align:center; padding:40px 20px; font-family:'Inter',sans-serif;">
    <div style="font-size:4rem; margin-bottom:16px;">🚫</div>
    <h1 style="font-size:1.5rem; color:#2f3a34; margin-bottom:8px;">Access Denied</h1>
    <p style="color:#888; max-width:300px; line-height:1.6;">
        This page can only be accessed by scanning the table QR code.<br>Please ask your server.
    </p>
    {% if reason %}
    <p style="margin-top:12px; font-size:0.75rem; color:#bbb;">{{ reason }}</p>
    {% endif %}
</div>
{% endblock %}
