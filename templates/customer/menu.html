<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kans Resto | Welcome</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #eef3ec;
            --bg-accent: #dfe8e2;
            --card-bg: #fffdf9;
            --accent: #8fae9b;
            --accent-strong: #6f927f;
            --text-main: #2f3a34;
            --text-muted: #6b776f;
            --input-bg: #f1f5f2;
            --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, var(--bg-accent), var(--bg-main));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden; /* Keeps it clean on laptop screens */
        }

        .phone-container {
            width: 100%;
            max-width: 350px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px 22px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-soft);
            max-height: 95vh;
            overflow-y: auto;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 18px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #a8c4b3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            box-shadow: 0 6px 18px rgba(143, 174, 155, 0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .input-group {
            margin-top: 18px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-strong);
            margin-bottom: 6px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #d9e2dc;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            border: 1px solid #d9e2dc;
            padding: 6px;
            border-radius: 14px;
        }

        .counter-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .counter-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Styling for the Anchor Button */
        .done-btn {
            margin-top: 22px;
            padding: 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(111, 146, 127, 0.35);
            transition: transform 0.2s ease;
            
            /* Anchor Specific Styles */
            display: block;
            text-decoration: none;
            text-align: center;
            border: none;
        }

        .done-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="phone-container">
    <div class="logo-area">
        <div class="logo-icon">🍃</div>
        <h1>Hey there 👋</h1>
        <p class="subtitle">Let's get you seated and eating.</p>
    </div>

    <!-- ✅ WTForm START -->
    <form method="POST" id="customerForm" action="{{ url_for('greeting.customer_menu', table_number=table_number) }}">
        {{ form.hidden_tag() }}

        <div class="input-group">
            <label>Your Name</label>
            {{ form.customer_name(
                placeholder="What should we call you?",
                id="nameInput"
            ) }}
        </div>

        <div class="input-group">
            <label>Guests</label>
            <div class="counter-container">
                <button type="button" class="counter-btn" id="minusBtn">−</button>

                <span class="counter-value">
                    <span id="guestCount">1</span> Person
                </span>

                <button type="button" class="counter-btn" id="plusBtn">+</button>
            </div>

            <!-- 🔥 Hidden field bound to WTForm -->
            {{ form.guest_count(id="guestInput", type="hidden") }}
        </div>

        <button type="submit" class="done-btn" id="doneBtn">
            Explore Menu 🍽️
        </button>
    </form>
    <!-- ✅ WTForm END -->
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    let guests = 1;
    const guestCount = document.getElementById("guestCount");
    const guestInput = document.getElementById("guestInput");

    // Initialize hidden input
    guestInput.value = guests;

    document.getElementById("plusBtn").addEventListener("click", () => {
        guests++;
        guestCount.textContent = guests;
        guestInput.value = guests;
    });

    document.getElementById("minusBtn").addEventListener("click", () => {
        if (guests > 1) {
            guests--;
            guestCount.textContent = guests;
            guestInput.value = guests;
        }
    });

    // UX animation only — NOT navigation
    document.getElementById("customerForm").addEventListener("submit", function () {
        gsap.to("#doneBtn", {
            scale: 0.95,
            duration: 0.1,
            yoyo: true,
            repeat: 1
        });
    });
</script>

<script>
    // If the server has provided a pre-created session_id, replace the
    // browser URL with the session path so the end-user sees the session
    // token instead of the template route. This runs after the page loads.
    (function() {
        var sid = "{{ session_id|default('') }}";
        if (sid) {
            try {
                var sessionPath = '/customer/session/' + sid;
                if (window.location.pathname !== sessionPath) {
                    history.replaceState(null, '', sessionPath + window.location.search);
                }
            } catch (e) {
                // Ignore errors in replaceState
                console.warn('URL replace failed', e);
            }
        }
    })();
</script>

</body>

</html>
