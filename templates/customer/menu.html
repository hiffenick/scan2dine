<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kans Resto | Welcome</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer/hello.css') }}">
</head>

<body>

<div class="scene">

    <div class="table-grain" aria-hidden="true"></div>

    <main class="card" role="main">

        <div class="card-top">
            <span class="rule" aria-hidden="true"></span>
            <span class="eyebrow">Table {{ table_number }}</span>
        </div>

        <div class="greet">
            <h1 class="greet-title">
                <span class="line">Welcome,</span>
                <span class="line accent">friend.</span>
            </h1>
            <p class="greet-sub">Settle in — tell us who's joining, and we'll set the table.</p>
        </div>

        <!-- ✅ WTForm START -->
        <form method="POST" id="customerForm" action="{{ url_for('greeting.customer_menu', table_number=table_number) }}" novalidate>
            {{ form.hidden_tag() }}

            <div class="field">
                <label for="nameInput">Your name</label>
                {{ form.customer_name(
                    placeholder="What should we call you?",
                    id="nameInput",
                    autocomplete="off"
                ) }}
            </div>

            <div class="field">
                <label id="partyLabel">Party of <span id="guestCount">1</span></label>

                <div class="seats" id="seatPicker" role="group" aria-labelledby="partyLabel">
                    <button type="button" class="seat-btn seat-minus" id="minusBtn" aria-label="Remove a guest">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>

                    <div class="seat-row" id="seatRow" aria-hidden="true">
                        <!-- seat glyphs injected by JS -->
                    </div>

                    <button type="button" class="seat-btn seat-plus" id="plusBtn" aria-label="Add a guest">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </div>

                <!-- 🔥 Hidden field bound to WTForm -->
                {{ form.guest_count(id="guestInput", type="hidden") }}
            </div>

            <button type="submit" class="done-btn" id="doneBtn">
                <span>View the menu</span>
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </form>
        <!-- ✅ WTForm END -->

    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="{{ url_for('static', filename='js/customer/hello.js') }}"></script>

<script>
    // If the server has provided a pre-created session_id, replace the
    // browser URL with the session path so the end-user sees the session
    // token instead of the template route. This runs after the page loads.
    (function() {
        var sid = "{{ session_id|default('') }}";
        if (sid) {
            try {
                var sessionPath = '/customer/session/' + sid;
                if (window.location.pathname !== sessionPath) {
                    history.replaceState(null, '', sessionPath + window.location.search);
                }
            } catch (e) {
                // Ignore errors in replaceState
                console.warn('URL replace failed', e);
            }
        }
    })();
</script>

</body>
</html>
